name = "cap-cloud"
main = "workers.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
DEMO_MODE = "false"
MEMORY_STORAGE = "false"

# Upstash Redis (required for Workers — Neon PG not available on Workers)
UPSTASH_REDIS_REST_URL = ""
UPSTASH_REDIS_REST_TOKEN = ""

# Admin key for dashboard access
ADMIN_KEY = ""

# Optional: CORS origin for admin API
CORS_ORIGIN = ""
